<div class="summary-row">

  <!-- Total de zonas evaluadas -->
  <div class="sc-card">
    <span class="sc-icon zi">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/>
      </svg>
    </span>
    <div class="sc-body">
      <div class="sc-val">{{ fmt(totalZonas) }}</div>
      <div class="sc-lbl">Zonas evaluadas</div>
    </div>
  </div>

  <!-- Riesgo alto -->
  <div class="sc-card">
    <span class="sc-icon al">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round">
        <path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
        <line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
      </svg>
    </span>
    <div class="sc-body">
      <div class="sc-val">{{ fmt(zonasAltas) }}</div>
      <div class="sc-lbl">Zonas de riesgo alto</div>
    </div>
  </div>

  <!-- Riesgo crítico -->
  <div class="sc-card">
    <span class="sc-icon cr">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round">
        <path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/>
      </svg>
    </span>
    <div class="sc-body">
      <div class="sc-val">{{ fmt(zonasCriticas) }}</div>
      <div class="sc-lbl">Zonas de riesgo crítico</div>
    </div>
  </div>

  <!-- Peligrosidad media -->
  <div class="sc-card">
    <span class="sc-icon pm">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2v4M2 12h4m12 0h4M12 12l5-3"/><circle cx="12" cy="12" r="9"/>
      </svg>
    </span>
    <div class="sc-body">
      <div class="sc-val">{{ hasData ? peligrosidadMedia.toFixed(0) + ' %' : '—' }}</div>
      <div class="sc-lbl">Peligrosidad media</div>
    </div>
  </div>

</div>
